# Semantic map for the Event Guide Robot demo.
#
# Coordinate source:
# - Positions come from puntos.txt, captured in the ROS "map" frame.
# - The centroid below is the average of the four measured points.
# - yaw values are calculated so each zone faces that centroid. Replace them
#   with RViz/AMCL-measured orientations if the demo layout needs another view.
# - labels use ArUco/AprilTag-style numeric marker IDs as the primary visual
#   signal. Print one marker per stand and place it next to the human-readable
#   stand name. Colors can be added physically as a secondary debugging cue, but
#   they are not the semantic identifier.

metadata:
  frame_id: map
  map_file: ../../../../map.yaml
  position_source: puntos.txt
  yaw_source: inferred_towards_centroid
  centroid:
    x: 0.13666607066988945
    y: 0.1921076737344265

